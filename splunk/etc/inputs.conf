# Purple Team Lab — Splunk Input Configuration

# HTTP Event Collector for all log sources
[http]
disabled = 0
port = 8088
enableSSL = 1
dedicatedIoThreads = 2

[http://purple-team-hec]
disabled = 0
index = cloudtrail
indexes = cloudtrail,vpc_flow,guardduty,falco,waf,dns
token = purple-team-hec-token
sourcetype = _json

# Monitor log staging directory (Fluent Bit writes here)
[monitor:///var/log/purple-team/cloudtrail/*.json]
disabled = 0
index = cloudtrail
sourcetype = aws:cloudtrail
host = purple-lab

[monitor:///var/log/purple-team/vpc_flow/*.json]
disabled = 0
index = vpc_flow
sourcetype = aws:cloudwatchlogs:vpcflow
host = purple-lab

[monitor:///var/log/purple-team/guardduty/*.json]
disabled = 0
index = guardduty
sourcetype = aws:cloudwatch:guardduty
host = purple-lab

[monitor:///var/log/purple-team/falco/*.json]
disabled = 0
index = falco
sourcetype = falco:alerts
host = purple-lab

[monitor:///var/log/purple-team/waf/*.json]
disabled = 0
index = waf
sourcetype = aws:waf
host = purple-lab

[monitor:///var/log/purple-team/dns/*.json]
disabled = 0
index = dns
sourcetype = aws:route53:querylog
host = purple-lab
