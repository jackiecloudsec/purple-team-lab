[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

# Read CloudTrail logs from staging dir
[INPUT]
    Name          tail
    Tag           cloudtrail
    Path          /var/log/purple-team/cloudtrail/*.json
    Parser        json
    Refresh_Interval 5
    Read_from_Head   true

# Read VPC Flow logs
[INPUT]
    Name          tail
    Tag           vpc_flow
    Path          /var/log/purple-team/vpc_flow/*.json
    Parser        json
    Refresh_Interval 5
    Read_from_Head   true

# Read GuardDuty findings
[INPUT]
    Name          tail
    Tag           guardduty
    Path          /var/log/purple-team/guardduty/*.json
    Parser        json
    Refresh_Interval 5
    Read_from_Head   true

# Read Falco alerts
[INPUT]
    Name          tail
    Tag           falco
    Path          /var/log/purple-team/falco/*.json
    Parser        json
    Refresh_Interval 5
    Read_from_Head   true

# Read WAF logs
[INPUT]
    Name          tail
    Tag           waf
    Path          /var/log/purple-team/waf/*.json
    Parser        json
    Refresh_Interval 5
    Read_from_Head   true

# Read DNS query logs
[INPUT]
    Name          tail
    Tag           dns
    Path          /var/log/purple-team/dns/*.json
    Parser        json
    Refresh_Interval 5
    Read_from_Head   true

# Route to Splunk HEC by tag
[OUTPUT]
    Name          splunk
    Match         cloudtrail
    Host          splunk
    Port          8088
    Splunk_Token  purple-team-hec-token
    Splunk_Send_Raw On
    TLS           On
    TLS.Verify    Off
    event_index   cloudtrail
    event_sourcetype aws:cloudtrail

[OUTPUT]
    Name          splunk
    Match         vpc_flow
    Host          splunk
    Port          8088
    Splunk_Token  purple-team-hec-token
    Splunk_Send_Raw On
    TLS           On
    TLS.Verify    Off
    event_index   vpc_flow
    event_sourcetype aws:cloudwatchlogs:vpcflow

[OUTPUT]
    Name          splunk
    Match         guardduty
    Host          splunk
    Port          8088
    Splunk_Token  purple-team-hec-token
    Splunk_Send_Raw On
    TLS           On
    TLS.Verify    Off
    event_index   guardduty
    event_sourcetype aws:cloudwatch:guardduty

[OUTPUT]
    Name          splunk
    Match         falco
    Host          splunk
    Port          8088
    Splunk_Token  purple-team-hec-token
    Splunk_Send_Raw On
    TLS           On
    TLS.Verify    Off
    event_index   falco
    event_sourcetype falco:alerts

[OUTPUT]
    Name          splunk
    Match         waf
    Host          splunk
    Port          8088
    Splunk_Token  purple-team-hec-token
    Splunk_Send_Raw On
    TLS           On
    TLS.Verify    Off
    event_index   waf
    event_sourcetype aws:waf

[OUTPUT]
    Name          splunk
    Match         dns
    Host          splunk
    Port          8088
    Splunk_Token  purple-team-hec-token
    Splunk_Send_Raw On
    TLS           On
    TLS.Verify    Off
    event_index   dns
    event_sourcetype aws:route53:querylog
