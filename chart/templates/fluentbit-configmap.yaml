apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "purple-team.fullname" . }}-fluentbit-config
  labels:
    app.kubernetes.io/component: fluentbit
    {{- include "purple-team.labels" . | nindent 4 }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  /fluent-bit/etc/parsers.conf

    [INPUT]
        Name          tail
        Tag           cloudtrail
        Path          /var/log/purple-team/cloudtrail/*.json
        Parser        json
        Refresh_Interval 5
        Read_from_Head   true

    [INPUT]
        Name          tail
        Tag           vpc_flow
        Path          /var/log/purple-team/vpc_flow/*.json
        Parser        json
        Refresh_Interval 5
        Read_from_Head   true

    [INPUT]
        Name          tail
        Tag           guardduty
        Path          /var/log/purple-team/guardduty/*.json
        Parser        json
        Refresh_Interval 5
        Read_from_Head   true

    [INPUT]
        Name          tail
        Tag           falco
        Path          /var/log/purple-team/falco/*.json
        Parser        json
        Refresh_Interval 5
        Read_from_Head   true

    [INPUT]
        Name          tail
        Tag           waf
        Path          /var/log/purple-team/waf/*.json
        Parser        json
        Refresh_Interval 5
        Read_from_Head   true

    [INPUT]
        Name          tail
        Tag           dns
        Path          /var/log/purple-team/dns/*.json
        Parser        json
        Refresh_Interval 5
        Read_from_Head   true

    [OUTPUT]
        Name          splunk
        Match         cloudtrail
        Host          {{ include "splunk.host" . }}
        Port          8088
        Splunk_Token  {{ .Values.splunk.hec.token }}
        Splunk_Send_Raw On
        TLS           {{ if .Values.splunk.hec.enableSSL }}On{{ else }}Off{{ end }}
        TLS.Verify    Off
        event_index   cloudtrail
        event_sourcetype aws:cloudtrail

    [OUTPUT]
        Name          splunk
        Match         vpc_flow
        Host          {{ include "splunk.host" . }}
        Port          8088
        Splunk_Token  {{ .Values.splunk.hec.token }}
        Splunk_Send_Raw On
        TLS           {{ if .Values.splunk.hec.enableSSL }}On{{ else }}Off{{ end }}
        TLS.Verify    Off
        event_index   vpc_flow
        event_sourcetype aws:cloudwatchlogs:vpcflow

    [OUTPUT]
        Name          splunk
        Match         guardduty
        Host          {{ include "splunk.host" . }}
        Port          8088
        Splunk_Token  {{ .Values.splunk.hec.token }}
        Splunk_Send_Raw On
        TLS           {{ if .Values.splunk.hec.enableSSL }}On{{ else }}Off{{ end }}
        TLS.Verify    Off
        event_index   guardduty
        event_sourcetype aws:cloudwatch:guardduty

    [OUTPUT]
        Name          splunk
        Match         falco
        Host          {{ include "splunk.host" . }}
        Port          8088
        Splunk_Token  {{ .Values.splunk.hec.token }}
        Splunk_Send_Raw On
        TLS           {{ if .Values.splunk.hec.enableSSL }}On{{ else }}Off{{ end }}
        TLS.Verify    Off
        event_index   falco
        event_sourcetype falco:alerts

    [OUTPUT]
        Name          splunk
        Match         waf
        Host          {{ include "splunk.host" . }}
        Port          8088
        Splunk_Token  {{ .Values.splunk.hec.token }}
        Splunk_Send_Raw On
        TLS           {{ if .Values.splunk.hec.enableSSL }}On{{ else }}Off{{ end }}
        TLS.Verify    Off
        event_index   waf
        event_sourcetype aws:waf

    [OUTPUT]
        Name          splunk
        Match         dns
        Host          {{ include "splunk.host" . }}
        Port          8088
        Splunk_Token  {{ .Values.splunk.hec.token }}
        Splunk_Send_Raw On
        TLS           {{ if .Values.splunk.hec.enableSSL }}On{{ else }}Off{{ end }}
        TLS.Verify    Off
        event_index   dns
        event_sourcetype aws:route53:querylog

  parsers.conf: |
    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%SZ
