apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "purple-team.fullname" . }}-splunk
  labels:
    app.kubernetes.io/component: splunk
    {{- include "purple-team.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: splunk
      {{- include "purple-team.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: splunk
        {{- include "purple-team.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: splunk
          image: {{ .Values.splunk.image }}
          env:
            - name: SPLUNK_START_ARGS
              value: "--accept-license"
            - name: SPLUNK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "purple-team.fullname" . }}-secrets
                  key: splunk-password
            - name: SPLUNK_LICENSE_URI
              value: {{ .Values.splunk.license }}
          ports:
            - name: web
              containerPort: 8000
            - name: hec
              containerPort: 8088
            - name: mgmt
              containerPort: 8089
            - name: forwarder
              containerPort: 9997
          volumeMounts:
            - name: splunk-data
              mountPath: /opt/splunk/var
            - name: splunk-config
              mountPath: /opt/splunk/etc/system/local/indexes.conf
              subPath: indexes.conf
            - name: splunk-config
              mountPath: /opt/splunk/etc/system/local/inputs.conf
              subPath: inputs.conf
            - name: splunk-config
              mountPath: /opt/splunk/etc/system/local/props.conf
              subPath: props.conf
            - name: splunk-config
              mountPath: /opt/splunk/etc/system/local/transforms.conf
              subPath: transforms.conf
            - name: splunk-config
              mountPath: /opt/splunk/etc/system/local/savedsearches.conf
              subPath: savedsearches.conf
            - name: log-staging
              mountPath: /var/log/purple-team
          resources:
            {{- toYaml .Values.splunk.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 180
            periodSeconds: 60
            timeoutSeconds: 10
      volumes:
        - name: splunk-data
          persistentVolumeClaim:
            claimName: {{ include "purple-team.fullname" . }}-splunk-data
        - name: splunk-config
          configMap:
            name: {{ include "purple-team.fullname" . }}-splunk-config
        - name: log-staging
          emptyDir: {}
